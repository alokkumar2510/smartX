# ─────────────────────────────────────────────────
#  SmartChat X — Nginx configuration
#  Terminates SSL, serves frontend, proxies to:
#    :8000  → FastAPI (chat/auth)
#    :3001  → Mediasoup SFU (Socket.io + media)
# ─────────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name smartchatx.alokkumarsahu.in www.smartchatx.alokkumarsahu.in;
    return 301 https://$host$request_uri;
}

# HTTPS + WebSocket proxy
server {
    listen 443 ssl http2;
    server_name smartchatx.alokkumarsahu.in www.smartchatx.alokkumarsahu.in;

    # SSL certs (managed by Certbot or Cloudflare Origin)
    ssl_certificate     /etc/letsencrypt/live/smartchatx.alokkumarsahu.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartchatx.alokkumarsahu.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header Permissions-Policy "camera=(self), microphone=(self)" always;

    # ── Static frontend (served from build output) ──────────────
    root /var/www/smartchatx;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Aggressive caching for hashed assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── FastAPI Backend (/api + /ws) ────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    300s;
    }

    location /ws {
        proxy_pass         http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Mediasoup SFU Server (Socket.io signaling) ──────────────
    # Frontend connects with path='/media/socket.io'
    # Nginx rewrites to /socket.io on the upstream
    location /media/ {
        proxy_pass         http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    location /media/socket.io/ {
        proxy_pass         http://127.0.0.1:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    location /media/health {
        proxy_pass         http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
